<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A terminal readout showing zero open ports on a workstation, next to a phone running a resumed Claude Code session over a Tailscale mesh">
  <defs>
    <radialGradient id="ccglow" cx="84%" cy="18%" r="64%">
      <stop offset="0%" stop-color="#5B9DFF" stop-opacity="0.26"/>
      <stop offset="55%" stop-color="#16283F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0C1116" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ccbars" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B9DFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A8CBFF" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0C1116"/>
  <rect width="1200" height="630" fill="url(#ccglow)"/>

  <!-- faint grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 158 H1200 M0 315 H1200 M0 472 H1200"/>
    <path d="M200 0 V630 M400 0 V630 M600 0 V630 M800 0 V630 M1000 0 V630"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="92" fill="#EDEAE3" font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="20" letter-spacing="4">TOM&#160;GIROU<tspan fill="#8FBAFF">.</tspan></text>

  <!-- prompt line -->
  <text x="80" y="190" font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="24" letter-spacing="1">
    <tspan fill="#8FBAFF">$ </tspan><tspan fill="#EDEAE3">ssh </tspan><tspan fill="#8A9199">tom@tom-precision-3570</tspan><tspan fill="#8FBAFF"> &#9646;</tspan>
  </text>

  <!-- hero figure: zero open ports (ink, not blue — data is the hero) -->
  <text x="76" y="388" fill="#EDEAE3" font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="176" font-weight="700" letter-spacing="-2">0</text>
  <text x="82" y="440" fill="#8FBAFF" font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="22" letter-spacing="6">OPEN&#160;PORTS</text>

  <!-- stat strip -->
  <g font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="22" letter-spacing="1">
    <text x="82" y="516"><tspan fill="#8FBAFF">2</tspan><tspan fill="#8A9199"> devices</tspan></text>
    <text x="300" y="516" fill="#565E66">·</text>
    <text x="340" y="516"><tspan fill="#8FBAFF">1</tspan><tspan fill="#8A9199"> tailnet</tspan></text>
    <text x="540" y="516" fill="#565E66">·</text>
    <text x="580" y="516"><tspan fill="#565E66">sshd </tspan><tspan fill="#EDEAE3">not installed</tspan></text>
  </g>

  <!-- phone running the resumed session -->
  <g>
    <rect x="866" y="128" width="254" height="392" rx="30" fill="#0F151B" stroke="#28323B" stroke-width="1.5"/>
    <rect x="962" y="146" width="62" height="8" rx="4" fill="#28323B"/>
    <g font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="17" letter-spacing="0.5">
      <text x="892" y="204"><tspan fill="#8FBAFF">$ </tspan><tspan fill="#EDEAE3">claude --resume</tspan></text>
      <text x="892" y="238" fill="#8A9199">session restored</text>
    </g>
    <!-- agent output filling the screen -->
    <g fill="#28323B">
      <rect x="892" y="262" width="200" height="10" rx="3"/>
      <rect x="892" y="284" width="164" height="10" rx="3"/>
      <rect x="892" y="306" width="186" height="10" rx="3"/>
      <rect x="892" y="328" width="128" height="10" rx="3"/>
      <rect x="892" y="350" width="176" height="10" rx="3"/>
    </g>
    <rect x="892" y="382" width="152" height="10" rx="3" fill="url(#ccbars)"/>
    <g font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="17">
      <text x="892" y="432" fill="#565E66">esc&#160;&#160;ctrl&#160;&#160;tab&#160;&#160;&#8593;&#160;&#8595;</text>
      <text x="892" y="482"><tspan fill="#8FBAFF">&#9646;</tspan></text>
    </g>
  </g>

  <!-- mesh link: workstation to phone -->
  <g stroke="#5B9DFF" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="2 7" stroke-linecap="round">
    <path d="M700 260 C 780 240, 800 240, 862 250"/>
  </g>
  <circle cx="700" cy="260" r="4" fill="#8FBAFF"/>
  <circle cx="862" cy="250" r="4" fill="#8FBAFF"/>

  <!-- baseline caption -->
  <text x="82" y="566" fill="#565E66" font-family="'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace" font-size="15" letter-spacing="3">WIREGUARD&#160;MESH&#160;·&#160;TAILSCALE&#160;SSH&#160;·&#160;TERMIUS&#160;ON&#160;ANDROID&#160;·&#160;CLAUDE&#160;--RESUME</text>
</svg>
