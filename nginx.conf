server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # cloudflared forwards as HTTP to origin, so absolute Location headers
    # would downgrade visitors to http://. Keep any nginx-issued redirects
    # (e.g. trailing-slash) relative.
    absolute_redirect off;

    # Unknown URLs must 404, not soft-404 with the homepage. Astro emits
    # dist/404.html in static mode; serve it as the error body.
    error_page 404 /404.html;

    # Locale routing for `/` lives in a Cloudflare Worker
    # (worker/src/locale-router.js): fr/es visitors get a 302 to /fr/ or
    # /es/ at the edge, EN falls through to this origin and is edge-cached.
    location = / {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://repo-wrapped.tom-girou.dev; font-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;
        try_files /index.html =404;
    }

    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://repo-wrapped.tom-girou.dev; font-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;
        try_files $uri $uri/ $uri.html =404;
    }

    # Content-hashed assets emitted by Astro — safe to cache forever.
    location ^~ /_astro/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static assets at stable URLs (site.js, favicon, fonts, og-image…)
    # must revalidate so a rebuild is picked up without a manual cache purge.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|jpg|jpeg|png|gif|webp|avif|ico)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(?:txt|xml)$ {
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
